name: CloudMail自动部署
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 全局安装pnpm与wrangler
        run: npm install -g pnpm wrangler

      - name: 部署云邮局Worker
        working-directory: ./mail-worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy
